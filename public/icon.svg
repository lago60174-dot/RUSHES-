<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#07090F"/>
    </linearGradient>
    <linearGradient id="gv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F1D96"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect width="512" height="512" rx="108" fill="none" stroke="url(#gv)" stroke-width="2" opacity="0.3"/>
  <!-- Film strip left -->
  <rect x="36" y="56" width="32" height="44" rx="7" fill="#7C3AED" opacity="0.25"/>
  <rect x="36" y="112" width="32" height="44" rx="7" fill="#7C3AED" opacity="0.2"/>
  <rect x="36" y="168" width="32" height="44" rx="7" fill="#7C3AED" opacity="0.15"/>
  <rect x="36" y="224" width="32" height="44" rx="7" fill="#7C3AED" opacity="0.1"/>
  <!-- Film strip right -->
  <rect x="444" y="56" width="32" height="44" rx="7" fill="#06B6D4" opacity="0.25"/>
  <rect x="444" y="112" width="32" height="44" rx="7" fill="#06B6D4" opacity="0.2"/>
  <rect x="444" y="168" width="32" height="44" rx="7" fill="#06B6D4" opacity="0.15"/>
  <rect x="444" y="224" width="32" height="44" rx="7" fill="#06B6D4" opacity="0.1"/>
  <!-- R letter -->
  <text x="258" y="348"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="310"
    font-weight="900"
    fill="url(#gv)"
    opacity="0.95">R</text>
  <!-- Accent dots -->
  <circle cx="186" cy="440" r="10" fill="#7C3AED" opacity="0.7"/>
  <circle cx="214" cy="440" r="7" fill="#A78BFA" opacity="0.5"/>
  <circle cx="256" cy="440" r="14" fill="url(#gv)" opacity="0.8"/>
  <circle cx="298" cy="440" r="7" fill="#06B6D4" opacity="0.5"/>
  <circle cx="326" cy="440" r="10" fill="#06B6D4" opacity="0.7"/>
</svg>
